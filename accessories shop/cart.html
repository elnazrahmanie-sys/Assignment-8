 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessories Shop - Cart</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

  <!-- External CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">

      <a class="navbar-brand fw-bold" href="index.html">
        Accessories Shop ✨
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="index.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="cart.html">
              Cart
            </a>
          </li>

        </ul>
      </div>

    </div>
  </nav>


  <!-- CART SECTION -->
  <section class="container my-5">

    <h2 class="text-center fw-bold mb-4">
      Your Shopping Cart
    </h2>
<!-- TABLE -->
<div class="table-responsive shadow rounded">

  <table class="table table-hover align-middle text-center mb-0">

    <thead class="table-dark">
      <tr>
        <th>Accessory</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>

      <!-- PRODUCT 1 -->
      <tr>
        <td>Elegant Ring</td>
        <td>
          <div class="input-group">
            <button class="btn btn-outline-dark minus">-</button>
            <input type="text" value="1" class="form-control quantity">
            <button class="btn btn-outline-dark plus">+</button>
          </div>
        </td>
        <td>$15</td>
        <td>
          <button class="btn btn-warning btn-sm"><i class="fa fa-heart"></i></button>
          <button class="btn btn-danger btn-sm" onclick="removeRow(this)">
  <i class="fa fa-trash"></i>
</button>
        </td>
      </tr>

      <!-- PRODUCT 2 -->
      <tr>
        <td>Silver Bracelet</td>
        <td>
          <div class="input-group">
            <button class="btn btn-outline-dark minus">-</button>
            <input type="text" value="1" class="form-control quantity">
            <button class="btn btn-outline-dark plus">+</button>
          </div>
        </td>
        <td>$20</td>
        <td>
          <button class="btn btn-warning btn-sm"><i class="fa fa-heart"></i></button>
          <button class="btn btn-danger btn-sm" onclick="removeRow(this)">
            <i class="fa fa-trash"></i>
          </button>
        </td>
      </tr>

      <!-- PRODUCT 3 -->
      <tr>
        <td>Golden Watch</td>
        <td>
          <div class="input-group">
            <button class="btn btn-outline-dark minus">-</button>
            <input type="text" value="1" class="form-control quantity">
            <button class="btn btn-outline-dark plus">+</button>
          </div>
        </td>
        <td>$70</td>
        <td>
          <button class="btn btn-warning btn-sm"><i class="fa fa-heart"></i></button>
          <button class="btn btn-danger btn-sm" onclick="removeRow(this)">
            <i class="fa fa-trash"></i>
          </button>
        </td>
      </tr>

      <!-- PRODUCT 4 -->
      <tr>
        <td>Shoulder Bag</td>
        <td>
          <div class="input-group">
            <button class="btn btn-outline-dark minus">-</button>
            <input type="text" value="1" class="form-control quantity">
            <button class="btn btn-outline-dark plus">+</button>
          </div>
        </td>
        <td>$55</td>
        <td>
          <button class="btn btn-warning btn-sm"><i class="fa fa-heart"></i></button>
          <button class="btn btn-danger btn-sm" onclick="removeRow(this)">
            <i class="fa fa-trash"></i>
          </button>
        </td>
      </tr>

      <!-- PRODUCT 5 -->
      <tr>
        <td>Pearl Clip</td>
        <td>
          <div class="input-group">
            <button class="btn btn-outline-dark minus">-</button>
            <input type="text" value="1" class="form-control quantity">
            <button class="btn btn-outline-dark plus">+</button>
          </div>
        </td>
        <td>$10</td>
        <td>
          <button class="btn btn-warning btn-sm"><i class="fa fa-heart"></i></button>
          <button class="btn btn-danger btn-sm" onclick="removeRow(this)">
            <i class="fa fa-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
  
    <!-- PROMO CODE -->
    <div class="card shadow-sm p-4 mt-4">

      <label class="fw-semibold mb-2">
        Have a discount code?
      </label>

      <div class="d-flex gap-2 flex-column flex-md-row">

        <input
          type="text"
          id="promo"
          class="form-control"
          placeholder="Enter promo code"
        >

        <button class="btn btn-dark">
          Apply
        </button>

      </div>

    </div>


    <!-- PROGRESS -->
    <div class="progress my-4" style="height: 25px;">

      <div
        class="progress-bar bg-dark"
        style="width: 25%;"
      >
        Cart
      </div>

    </div>


    <!-- SUMMARY -->
    <div class="card shadow p-4 text-end">

      <h4 id="cart-total" class="fw-bold">
        Total: $35
      </h4>

      <p class="text-muted">
        Shipping: Free
      </p>

      <button
        id="checkout-btn"
        class="btn btn-dark w-100 w-md-auto"
      >
        <i class="fa fa-credit-card"></i>
        Checkout
      </button>

    </div>

  </section>


  <!-- FOOTER -->
  <footer class="text-center py-4">
    © 2026 Accessories Shop
  </footer>


  <!-- JS -->
  <script src="js/cart.js"></script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

</body>
</html>
